services:
  redis:
    image: redis:8.2
    container_name: memagent-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Bind to loopback only: an unauthenticated Redis on 0.0.0.0 would let any LAN host
      # read/delete/poison memory (bypassing the ingestion sanitizer). This is the local-only
      # trust boundary for a single-user dev/demo stack.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
  redisinsight:
    # dev-only inspector (port 5540); not exercised by CI or tests, so the floating tag is
    # intentional — only the redis:8.2 image above is pinned "tested == shipped".
    image: redis/redisinsight:latest
    container_name: memagent-redisinsight
    ports:
      # Loopback-only, same local trust boundary as redis above.
      - "127.0.0.1:5540:5540"
    depends_on:
      redis:
        condition: service_healthy
volumes:
  redis-data:
