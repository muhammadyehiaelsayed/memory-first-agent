name: ci
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.2 # MUST match docker-compose.yml (tested == shipped)
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --frozen
      - name: Secret scan (grep-based, keyless, deterministic)
        run: |
          pattern='(sk-(proj-)?[A-Za-z0-9_-]{20,})|(AKIA[0-9A-Z]{16})|(-----BEGIN [A-Z ]*PRIVATE KEY-----)|(gh[pousr]_[A-Za-z0-9]{36,})'
          if git grep -nEI "$pattern" -- ':!.env.example'; then
            echo "::error::Potential committed secret detected (see matches above)"
            exit 1
          fi
          echo "No committed secrets detected"
      # Advisory only (continue-on-error): findings surface in logs without failing the build.
      # Known open item: pytest is pinned to 8.4 despite PYSEC-2026-1845 (fixed in 9.0.3) — the
      # fix requires pytest 9, but pytest-bdd 8.1 (latest) calls a pytest-9-deprecated fixture API
      # and floods the run with deprecation warnings. It is a test-only dependency (never shipped
      # at runtime), so the pin is held until pytest-bdd supports pytest 9 cleanly. See DECISIONS.md.
      - name: Dependency vulnerability audit (pip-audit, non-blocking)
        continue-on-error: true
        run: |
          uv export --frozen --no-emit-project --format requirements-txt -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
      - name: Lint + format check
        run: uv run ruff check . && uv run ruff format --check .
      - name: Unit tests (keyless, no network)
        run: uv run pytest -m "not integration and not e2e" --cov=memagent --cov-report=term
      - name: Integration + e2e tests (redis:8.2)
        run: uv run pytest -m "integration or e2e" --cov=memagent --cov-append --cov-report=term
        env:
          REDIS_URL: redis://localhost:6379/0
      - name: Lifecycle eval gate (--mock)
        run: uv run python scripts/eval_lifecycle.py --mock
      - name: Grounding eval demonstration (--mock)
        run: uv run python scripts/eval_grounding.py --mock
      - name: Coverage report (no gate)
        run: uv run coverage report
