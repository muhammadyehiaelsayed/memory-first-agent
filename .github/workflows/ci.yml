name: ci
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.2 # MUST match docker-compose.yml (tested == shipped)
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint + format check
        run: uv run ruff check . && uv run ruff format --check .
      - name: Unit tests (keyless, no network)
        run: uv run pytest -m "not integration and not e2e" --cov=memagent --cov-report=term
      - name: Integration + e2e tests (redis:8.2)
        run: uv run pytest -m "integration or e2e" --cov=memagent --cov-append --cov-report=term
        env:
          REDIS_URL: redis://localhost:6379/0
      - name: Lifecycle eval gate (--mock)
        run: uv run python scripts/eval_lifecycle.py --mock
      - name: Grounding eval demonstration (--mock)
        run: uv run python scripts/eval_grounding.py --mock
      - name: Coverage report (no gate)
        run: uv run coverage report
